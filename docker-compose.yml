services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./laravel:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hoops

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hoops

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: hoops
      MYSQL_USER: hoops
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-usecret", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hoops

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - hoops

volumes:
  mysql_data:
  redis_data:

networks:
  hoops:
    driver: bridge
